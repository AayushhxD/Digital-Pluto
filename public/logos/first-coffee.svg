<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="white"/>
  <!-- Outer circle -->
  <circle cx="150" cy="150" r="135" fill="#6B2020"/>
  <!-- Inner circle border -->
  <circle cx="150" cy="150" r="110" fill="none" stroke="white" stroke-width="3"/>
  <!-- Top text: THE FIRST -->
  <path id="topArc" d="M 40,150 A 110,110 0 0,1 260,150" fill="none"/>
  <text font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="6">
    <textPath href="#topArc" startOffset="10%">THE FIRST</textPath>
  </text>
  <!-- Bottom text: COFFEE -->
  <path id="bottomArc" d="M 45,165 A 110,110 0 0,0 255,165" fill="none"/>
  <text font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="10">
    <textPath href="#bottomArc" startOffset="12%">COFFEE</textPath>
  </text>
  <!-- Coffee bean left -->
  <ellipse cx="58" cy="150" rx="10" ry="16" fill="white" transform="rotate(-30,58,150)"/>
  <line x1="52" y1="143" x2="64" y2="157" stroke="#6B2020" stroke-width="2"/>
  <!-- Coffee bean right -->
  <ellipse cx="242" cy="150" rx="10" ry="16" fill="white" transform="rotate(30,242,150)"/>
  <line x1="236" y1="143" x2="248" y2="157" stroke="#6B2020" stroke-width="2"/>
  <!-- Center face illustration (simplified line art) -->
  <g stroke="white" stroke-width="2" fill="none">
    <!-- Face oval -->
    <ellipse cx="150" cy="148" rx="28" ry="35"/>
    <!-- Eyes -->
    <ellipse cx="141" cy="140" rx="4" ry="5"/>
    <ellipse cx="159" cy="140" rx="4" ry="5"/>
    <!-- Nose -->
    <path d="M 150,148 Q 146,157 150,160 Q 154,157 150,148"/>
    <!-- Mouth -->
    <path d="M 142,167 Q 150,173 158,167"/>
    <!-- Crown/headdress -->
    <path d="M 122,120 Q 150,90 178,120"/>
    <path d="M 130,115 Q 150,95 170,115"/>
    <!-- Crown center loop -->
    <path d="M 150,95 Q 155,85 150,80 Q 145,85 150,95"/>
  </g>
</svg>
