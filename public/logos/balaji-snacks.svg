<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <rect width="300" height="340" fill="white"/>
  <!-- Tilak / Balaji symbol -->
  <g transform="translate(150,10)">
    <!-- U shape outer -->
    <path d="M -30,0 L -30,55 Q -30,80 0,80 Q 30,80 30,55 L 30,0 L 22,0 L 22,55 Q 22,72 0,72 Q -22,72 -22,55 L -22,0 Z" fill="none" stroke="#cccccc" stroke-width="3"/>
    <!-- Inner red teardrop -->
    <path d="M 0,18 Q 8,38 8,52 Q 8,68 0,72 Q -8,68 -8,52 Q -8,38 0,18 Z" fill="#cc1111"/>
  </g>
  <!-- Balaji Devanagari styled text (using artistic approximation) -->
  <text x="150" y="175" font-family="'Noto Sans Devanagari', Arial, sans-serif" font-size="54" font-weight="bold" fill="none" stroke="#bbbbbb" stroke-width="2.5" text-anchor="middle">बालाजी</text>
  <text x="150" y="250" font-family="'Noto Sans Devanagari', Arial, sans-serif" font-size="46" font-weight="bold" fill="none" stroke="#bbbbbb" stroke-width="2.5" text-anchor="middle">स्नॅक्स</text>
  <!-- Brand name in English below -->
  <text x="150" y="300" font-family="Arial, sans-serif" font-size="18" letter-spacing="4" fill="#aaaaaa" text-anchor="middle">BALAJI SNACKS</text>
</svg>
